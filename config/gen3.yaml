text_sensor:
  - platform: template
    id: nbs_time_text
    name: "NBS Time"
    lambda: !lambda |-
      char buf[10];
      auto t = id(nbs_time).now();
      snprintf(buf, sizeof(buf), "%02d:%02d", t.hour, t.minute);
      return std::string(buf);

  # --- Last cleaning ---
  - platform: template
    name: "Last cleaning time"
    id: last_cleaning_time

  - platform: template
