number:
  # --- Spot cleaning ---
  - platform: template
    id: spot_width
    min_value: 100
    max_value: 400
    step: 1
    unit_of_measurement: cm
    mode: SLIDER
    name: Spot Clean Width
    optimistic: true

  - platform: template
    id: spot_height
    min_value: 100
    max_value: 400
    step: 1
    unit_of_measurement: cm
    mode: SLIDER
    name: Spot Clean Height
    optimistic: true


select:
  - platform: logger
    name: "Logger select"


button:
  - platform: template
    name: "House Clean"
    id: houseClean
    icon: mdi:home
    on_press:
      - script.execute:
          id: play_extra_sounds
          soundid: 1
      - uart.write: "Clean House \n"

  - platform: template
    name: "Spot Clean"
    icon: mdi:target
    on_press:
      - script.execute:
          id: play_extra_sounds
          soundid: 1
      - uart.write: "Clean Spot \n"

  - platform: template
    name: "Spot Clean (Height & Width)"
    icon: mdi:target
    on_press:
      then:
        - uart.write: !lambda |-
            // Convert numbers to integers
            int w = (int) id(spot_width).state;
            int h = (int) id(spot_height).state;

            std::string cmd = "Clean Spot Width " + std::to_string(w) + " Height " + std::to_string(h) + "\n";
            id(play_extra_sounds)->execute(1);
            return std::vector<uint8_t>(cmd.begin(), cmd.end());

  - platform: template
    name: "Stop Cleaning"
    icon: mdi:stop
    on_press:
      - uart.write: "SetButton start \n"
      - delay: 1250ms
      - uart.write: "SetButton soft \n"

  - platform: template
    name: "Pause Cleaning"
    icon: mdi:pause
    on_press:
      - uart.write: "SetButton start \n"

  - platform: template
    name: "Resume Cleaning"
    icon: mdi:play
    on_press:
      - uart.write: "SetButton start \n"

  - platform: template
    name: "Send to start"
    icon: mdi:home
    on_press:
      - uart.write: "SetButton down \n"
      - delay: 1250ms
      - uart.write: "SetButton soft \n"

  - platform: template
    name: "Locate Robot"
    icon: mdi:volume-high
    on_press:
      - uart.write: "PlaySound SoundId 2 \n"  

  - platform: template
    name: "Update status"
    icon: mdi:refresh
    on_press:
      - script.execute: get_all_data 
    entity_category: "diagnostic"

  - platform: template
    name: "Clear errors"
    icon: mdi:notification-clear-all
    on_press:
      - uart.write: "GetErr clear \n"
    entity_category: "diagnostic"

  - platform: template
    name: "Shutdown"
    icon: mdi:power
    on_press:
      - script.execute: robotShutdown 
    entity_category: "diagnostic"

  - platform: template
    name: "PowerCycle"
    icon: mdi:restart
    on_press:
      - script.execute: powercycle 
    entity_category: "diagnostic"

  - platform: restart
    name: Reboot ESP

