# !!! WHAT YOU WILL NEED TO CHANGE !!!
# If you need any help, don't hesitate to ask for it in the discord or discussions!

# platform, based on https://esphome.io/components/#supported-microcontrollers 
# If you are using an ESP32, set your variant to which one you have e.g. ESP32C3, ESP32S3, ESP32C6 etc
# if you are using an ESP8266, remove the "esp32" part and define an "esp8266" you will NEED to add "restore_from_flash" to "true"
esp32:
  variant: ESP32
  framework:
    type: esp-idf

# You will need to figure out which pins work on your board for UART.
substitutions:
  uart_tx: <SET BASED ON YOUR DEVICE>
  uart_rx: <SET BASED ON YOUR DEVICE>
  comment: "" # If you want to write a comment about this vacuum, do so here. e.g. "Downstairs garage vacuum"

  infointerval: 2sec
  chargerinterval: 2min

  reboot_timeout: 15min # if you have Home Assistant but not always connected, put this to "0s" to disable it, the esp will only reboot if the api connection is lost, after the time specified here

  # ---- Version and robot type ----
  version: "1.2"
  type: "gen2"
  buildinfo: "${version}-[${uart_tx}/${uart_rx}]"
  # --------------------------------

  time_platform: homeassistant # use "homeassistant" if you are using Home Assistant, use "sntp" if not
  timezone: null # if you have Home Assistant, you don't need this, if you use sntp, then define your timezone here!

# If you don't want the webserver, uncomment/remove this part
web_server:
  port: 80
  js_url: "https://cdn.jsdelivr.net/gh/philip2809/neato-brainslug@main/config/js/1.2.js"

logger:
  baud_rate: 0

ota:
  - platform: esphome
    password: !secret neato_vacuum_ota

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "neato-brainslug"
    password: "make-it-suck-again"

  # If your router sets another TLD for local devices, specify that here
  #domain: .lan
  # If you are having issues with the dns or are 100% this will be the ip, you can spesify that here
  #use_address: 192.168.205.199

captive_portal:

esphome:
  name: neato-vacuum # If you want another name, change it here, remeber to replace it in the ha-card.yaml!
##############################################################################################################################

#   Combatability between esphome config and this card is ensured as long as the
#   minor version's match, for relase candicates, betas etc (indicated by X.X-a/b/rc.X), the version
#   has to match perfectly otherwise compatability is not promised. 
#
#   Please try to keep the versions the same, and check the github for updates!
  project: 
    name: philip2809.neato-brainslug
    version: ${buildinfo}

  comment: "${type}|${buildinfo}|${comment}"

  on_boot:
    - priority: 600
      then:
        - lambda: !lambda |-
            id(uiState).publish_state("Starting...");
        - logger.set_level: INFO

    - priority: -100
      then:
        - lambda: !lambda |-
            id(uiState).publish_state("Starting...");

            // Update nbs_time and text entity from persisted global
            if (!id(g_timezone).empty()) {
              id(nbs_time).set_timezone(id(g_timezone).c_str());
              id(timezone_text).publish_state(id(g_timezone).c_str());
              ESP_LOGI("timezone", "Restored timezone: %s", id(g_timezone).c_str());
            }

            char buf[40];
            snprintf(
              buf, sizeof(buf),
              "%u,%u,%u,%u,%u,%u,%u,%u",
              id(g_schedule)[0],
              id(g_schedule)[1],
              id(g_schedule)[2],
              id(g_schedule)[3],
              id(g_schedule)[4],
              id(g_schedule)[5],
              id(g_schedule)[6],
              id(g_schedule)[7]
            );

            id(scheduleset).publish_state(buf);


api:
  encryption:
    key: !secret neato_vacuum_api

  reboot_timeout: ${reboot_timeout}

  actions:
    - action: send_cmd
      variables:
        command: string
      then:
        - uart.write: !lambda |-
            // Convert to std::string
            std::string s = command;

            // IMPORTANT: keep newline exactly like YAML version
            if (s.empty() || s.back() != '\n')
              s += "\n";

            // convert string → vector<uint8_t>
            return std::vector<uint8_t>(s.begin(), s.end());

    - action: play_sound
      variables:
        soundid: int
      then:
        - uart.write: !lambda |-
            // Create std::string
            std::string s = "PlaySound SoundId " + std::to_string(soundid) + "\n";
            // convert string → vector<uint8_t>
            return std::vector<uint8_t>(s.begin(), s.end());


script:
  - id: get_user_settings
    mode: queued
    then:
      - delay: 100ms
      - uart.write: "GetUserSettings \n"

  - id: get_all_data
    mode: queued
    then: 
      - uart.write: "GetErr \n"  
      - delay: 50ms  
      - uart.write: "GetCharger \n"    
      - delay: 50ms  
      - uart.write: "GetUserSettings \n"  
      - delay: 50ms
      - uart.write: "SetSystemMode \n"
      - delay: 50ms  
      - uart.write: "GetVersion \n"    
  
  - id: initial_data_get # when the robot has booted, run this initial fetch after 5 seconds of being able to send commands, the 5 sec needed to the robot can calculate battery level etc.
    mode: queued
    then: 
      - delay: 5sec
      - script.execute: get_all_data

  - id: robotShutdown
    mode: queued
    then:
      - lambda: 'id(uiState).publish_state("Shutting down...");'
      - uart.write: "TestMode On \n"
      - delay: 100ms
      - uart.write: "SetSystemMode Shutdown \n"

  - id: powercycle
    mode: queued
    then:
      - lambda: 'id(initial_ready) = false;' # I want to refetch all data in case we powercycle
      - lambda: 'id(uiState).publish_state("Shutting down...");'
      - uart.write: "TestMode On \n"
      - delay: 100ms
      - uart.write: "SetSystemMode PowerCycle \n"

  - id: play_extra_sounds
    parameters:
      soundid: int
    then:
      - if:
          condition:
            lambda: |-
              return id(g_play_extra_sounds);
          then:
            - uart.write: !lambda |-
                std::string s =
                  "PlaySound SoundId " + std::to_string(soundid) + "\n";
                return std::vector<uint8_t>(s.begin(), s.end());


globals:
  - id: initial_ready
    type: bool
    restore_value: no
    initial_value: 'false'

  # --- Restore Value ---
  - id: g_play_extra_sounds
    type: bool
    restore_value: yes

  - id: g_schedule
    type: uint8_t[8]
    restore_value: yes
    initial_value: '{0,0,0,0,0,0,0,0}'

  - id: g_timezone
    type: std::string
    restore_value: yes
    initial_value: ''


interval:
  - interval: ${infointerval}
    then:
      - uart.write: "GetErr \n"
  - interval: ${chargerinterval}
    then: 
      - uart.write: "GetCharger \n"


uart:
  id: uart_bus
  baud_rate: 115200
  tx_pin: ${uart_tx}
  rx_pin: ${uart_rx}
  rx_buffer_size: 2048
  debug:
    dummy_receiver: true
    direction: RX
    after:
      bytes: 0
      delimiter: "\x1A"
    sequence:
      - lambda: !lambda |-
          UARTDebug::log_string(direction, bytes);

          // convert bytes -> std::string
          std::string str(bytes.begin(), bytes.end());

          // ---- TRIM FUNCTION ----
          auto trim = [](std::string &s) {
            // trim leading
            s.erase(s.begin(), std::find_if(s.begin(), s.end(),
                [](unsigned char ch){ return !std::isspace(ch); }));
            // trim trailing
            s.erase(std::find_if(s.rbegin(), s.rend(),
                [](unsigned char ch){ return !std::isspace(ch); }).base(), s.end());
          };

          // --- HEX DECODER ---
          auto hex_to_uint32 = [](const std::string &hex) -> uint32_t {
              return static_cast<uint32_t>(strtoul(hex.c_str(), nullptr, 16));
          };

          // ---- SPLIT ON CRLF ----
          std::vector<std::string> lines;
          size_t start = 0;
          size_t end = 0;

          while ((end = str.find("\r\n", start)) != std::string::npos) {
            std::string line = str.substr(start, end - start);
            trim(line);
            if (!line.empty()) lines.push_back(line);
            start = end + 2;
          }

          if (start < str.size()) {
            std::string last = str.substr(start);
            trim(last);
            if (!last.empty()) lines.push_back(last);
          }

          if (lines.empty()) return;

          // ---- DETECT WHICH COMMAND WAS USED ----
          std::string command = lines[0];  // first line (GetErr, GetState, etc.)


          ESP_LOGI("uart_parser", "COMMAND: %s", command.c_str());
          // ---- OPTIONAL: print each line for debugging ----
          for (auto &line : lines) {
            std::vector<uint8_t> v(line.begin(), line.end());
            UARTDebug::log_string(direction, v);
            //ESP_LOGI("uart_parser", "LINE: %s", line.c_str());
          }



          // ---- SPECIAL PARSING FOR GetErr ----
          if (command == "GetErr") {
            // A GetErr response looks like for gen2:
            // 0: GetErr
            // 1: <error>

            if (lines.size() == 3 && lines[1] != "") id(robotError).publish_state(lines[1].c_str());
            else id(robotError).publish_state("No errors");

            // If we can get erros/alerts, the system is ready for other commands:
            if (!id(initial_ready)) {
                id(initial_ready) = true;
                id(uiState).publish_state("Started, ready for commands!");
                id(initial_data_get).execute();
            }
          }

          else if (command == "GetCharger") {
            // Format after the header:
            // Label,Value
            // FuelPercent,53
            // BatteryOverTemp,0
            // ...

            for (size_t i = 2; i < lines.size(); i++) {
              std::string &line = lines[i];

              size_t comma = line.find(',');
              if (comma == std::string::npos) continue;

              std::string key = line.substr(0, comma);
              std::string value = line.substr(comma + 1);

              // Trim them:
              trim(key);
              trim(value);

              // ---- MATCH KEYS AND PUBLISH ----
                   if (key == "FuelPercent") id(chargerFuelPercent).publish_state(atof(value.c_str()));
              else if (key == "BatteryOverTemp") id(chargerBatteryOverTemp).publish_state(value == "1");
              else if (key == "ChargingActive") id(chargerChargingActive).publish_state(value == "1");
              else if (key == "ChargingEnabled") id(chargerChargingEnabled).publish_state(value == "1");
              else if (key == "ConfidentOnFuel") id(chargerConfidentOnFuel).publish_state(value == "1");
              else if (key == "OnReservedFuel") id(chargerOnReservedFuel).publish_state(value == "1");
              else if (key == "EmptyFuel") id(chargerEmptyFuel).publish_state(value == "1");
              else if (key == "BatteryFailure") id(chargerBatteryFailure).publish_state(value == "1");
              else if (key == "ExtPwrPresent") id(chargerExtPwrPresent).publish_state(value == "1");
              else if (key == "ThermistorPresent") id(chargerThermistorPresent).publish_state(value == "1");
              else if (key == "BattTempCAvg") id(chargerBattTempCAvg).publish_state(atof(value.c_str()));
              else if (key == "VBattV") id(chargerVBattV).publish_state(atof(value.c_str()));
              else if (key == "VExtV") id(chargerVExtV).publish_state(atof(value.c_str()));
              else if (key == "Charger_mAH") id(chargerCharger_mAH).publish_state(atof(value.c_str()));
              else if (key == "Discharge_mAH") id(chargerDischarge_mAH).publish_state(atof(value.c_str()));
            }
          }

          else if (command == "SetSystemMode") { // Using this command to figure out if you have testmode on or off
            // 0: SetSystemMode
            // 1: "TestMode must be on to use this command." OR "No options specified"
            if (lines.size() != 2) return;
            if (lines[1] == "No options specified") id(testMode).publish_state(true);
            else if (lines[1] == "TestMode must be on to use this command.") id(testMode).publish_state(false);
          }

          else if (command == "GetVersion") {
            for (auto &line : lines) {
              size_t comma = line.find(',');
              if (comma == std::string::npos) continue;

              std::string key = line.substr(0, comma);
              std::string value = line.substr(comma + 1);
              trim(key);
              trim(value);

                   if (key == "Serial Number") id(robotSerial).publish_state(value.c_str());
              else if (key == "Model") id(robotModel).publish_state(value.c_str());
              else if (key == "Software") id(robotSoftware).publish_state(value.c_str());
            }
          }

          else if (command == "GetUserSettings") {
            for (auto &line : lines) {
              trim(line);

              // Skip lines that start with binary/invalid chars
              if (!line.empty() && static_cast<unsigned char>(line[0]) >= 0x80) continue;

              // ---- Key,Value lines ----
              size_t comma = line.find(',');
              if (comma != std::string::npos) {
                std::string key = line.substr(0, comma);
                std::string value = line.substr(comma + 1);
                trim(key);
                trim(value);

                     if (key == "ClickSounds") id(clickSounds).publish_state(value == "ON");
                else if (key == "StealthLED") id(stealthLed).publish_state(value == "ON");
                else if (key == "LED") id(led).publish_state(value == "ON");
                else if (key == "AutoShutdown") id(autoShutdownEnabled).publish_state(value == "ON");
                else if (key == "Wall Enable") id(wallEnable).publish_state(value == "ON");
                else if (key == "Eco Mode") id(ecoMode).publish_state(value == "ON");
                else if (key == "IntenseClean") id(intenseClean).publish_state(value == "ON");
                else if (key == "WiFi") id(wifiOnOff).publish_state(value == "ON");
                else if (key == "Melody Sounds") id(melodySounds).publish_state(value == "ON");
                else if (key == "Warning Sounds") id(warningSounds).publish_state(value == "ON");
                else if (key == "Bin Full Detect") id(binFullDetect).publish_state(value == "ON");
              } 
              else if (line.find("Schedule is Enabled") != std::string::npos) id(scheduleEnabled).publish_state(true);
              else if (line.find("Schedule is Disabled") != std::string::npos) id(scheduleEnabled).publish_state(false);
            }
          } else if (command.find("<Fast Memory>") != std::string::npos) id(uiState).publish_state("Starting...");


time:
  - platform: ${time_platform}
    timezone: ${timezone}
    id: nbs_time
    on_time:
      - minutes: /10
        seconds: 0
        then:
          - lambda: !lambda |-
              auto now = id(nbs_time).now();
              if (!now.is_valid()) return;

              uint8_t flags = id(g_schedule)[0];

              // bit 0 = global enable
              if (!(flags & 0x01)) {
                ESP_LOGD("schedule", "Global disabled");
                return;
              }

              // day_of_week: Sunday=1 ... Saturday=7
              uint8_t dow = now.day_of_week;

              // bit for day enable: bit1 = Sunday, bit2 = Monday, ...
              uint8_t day_bit = 1 << dow;
              if (!(flags & day_bit)) {
                ESP_LOGD("schedule", "Day %d disabled", dow);
                return;
              }

              // schedule value for today
              uint8_t value = id(g_schedule)[dow];

              // convert value → hour/min
              uint8_t target_hour = value / 6;
              uint8_t target_min  = (value % 6) * 10;

              ESP_LOGD("schedule",
                "Now %02d:%02d | Target %02d:%02d (value=%d)",
                now.hour, now.minute,
                target_hour, target_min,
                value
              );

              // check match
              if (now.hour == target_hour && now.minute == target_min) {
                ESP_LOGD("schedule", "Schedule matched → DO ACTION");
                id(houseClean).press();
              }


text:
  - platform: template
    id: scheduleset
    name: "ScheduleSet"
    mode: TEXT
    set_action:
      lambda: !lambda |-
        int i = 0;
        char *p = strtok((char *)x.c_str(), ",");

        while (p && i < 8) {
          int v = atoi(p);

          if (i == 0) {          // flags
            if (v < 0) v = 0;
            if (v > 255) v = 255;
          } else {               // day values
            if (v < 0) v = 0;
            if (v > 143) v = 143;
          }

          id(g_schedule)[i++] = (uint8_t)v;
          p = strtok(nullptr, ",");
        }

        if (i != 8) {
          ESP_LOGW("schedule", "Invalid schedule string");
        }

        char buf[40];
        snprintf(
          buf, sizeof(buf),
          "%u,%u,%u,%u,%u,%u,%u,%u",
          id(g_schedule)[0],
          id(g_schedule)[1],
          id(g_schedule)[2],
          id(g_schedule)[3],
          id(g_schedule)[4],
          id(g_schedule)[5],
          id(g_schedule)[6],
          id(g_schedule)[7]
        );

        id(scheduleset).publish_state(buf);

  - platform: template
    id: timezone_text
    name: "Timezone"
    mode: TEXT
    set_action:
      lambda: !lambda |-
        id(timezone_text).publish_state(x.c_str()); // update this text component
        id(g_timezone) = std::string(x.c_str()); // store tz in global
        id(nbs_time).set_timezone(x.c_str()); // set timezone for time
        ESP_LOGI("timezone", "Timezone set to: %s", x.c_str()); // log


