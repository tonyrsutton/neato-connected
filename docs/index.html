<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neato Tools</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #141414;
    color: #e0e0e0;
    font-family: 'Trebuchet MS', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .container {
    width: 100%;
    max-width: 480px;
  }

  h1 {
    font-size: 1.3rem;
    font-weight: 600;
    color: #fff;
    margin-bottom: 0.3rem;
  }

  .page-sub {
    font-size: 0.8rem;
    color: #555;
    margin-bottom: 2rem;
  }

  .tools {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
  }

  a.tool-card {
    display: block;
    background: #1e1e1e;
    border: 1px solid #2e2e2e;
    border-radius: 10px;
    padding: 1.1rem 1.25rem;
    text-decoration: none;
    transition: border-color 0.15s, background 0.15s;
  }

  a.tool-card:hover {
    background: #222;
    border-color: #3a3a3a;
  }

  .tool-title {
    font-size: 0.95rem;
    font-weight: 600;
    color: #e0e0e0;
    margin-bottom: 0.25rem;
  }

  .tool-desc {
    font-size: 0.8rem;
    color: #666;
  }

  .more {
    font-size: 0.78rem;
    color: #555;
    padding-left: 0.25rem;
  }
</style>
</head>
<body>

<div class="container">
  <h1>Neato Tools</h1>
  <p class="page-sub">A small collection of utilities for your Neato robot.</p>

  <div class="tools">
    <a class="tool-card" href="./version.html">
      <div class="tool-title">Version Checker</div>
      <div class="tool-desc">Quickly check the software version of your Neato.</div>
    </a>
  </div>

  <p class="more">More coming soon.</p>
</div>

</body>
</html>
